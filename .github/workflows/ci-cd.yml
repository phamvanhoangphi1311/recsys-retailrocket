name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install gensim faiss-cpu lightgbm
          pip install fastapi httpx uvicorn pytest pandas numpy scikit-learn

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  detect-changes:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    outputs:
      train_changed: ${{ steps.check.outputs.train_changed }}
      feature_changed: ${{ steps.check.outputs.feature_changed }}
      serve_changed: ${{ steps.check.outputs.serve_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect which code changed
        id: check
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files:"
          echo "$CHANGED"

          if echo "$CHANGED" | grep -qE "^src/model_|^configs/|^Dockerfile.train|^requirements-train"; then
            echo "train_changed=true" >> $GITHUB_OUTPUT
          else
            echo "train_changed=false" >> $GITHUB_OUTPUT
          fi

          if echo "$CHANGED" | grep -qE "^src/feature_engineer/|^src/data_pipeline/|^Dockerfile.feature|^requirements-feature"; then
            echo "feature_changed=true" >> $GITHUB_OUTPUT
          else
            echo "feature_changed=false" >> $GITHUB_OUTPUT
          fi

          if echo "$CHANGED" | grep -qE "^api_gateway/|^src/id_mapper"; then
            echo "serve_changed=true" >> $GITHUB_OUTPUT
          else
            echo "serve_changed=false" >> $GITHUB_OUTPUT
          fi

  build-train:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.train_changed == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push training image
        run: |
          TAG=$(git rev-parse --short HEAD)
          REGISTRY=${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/recsys
          docker build -f Dockerfile.train -t $REGISTRY/recsys-train:$TAG .
          docker push $REGISTRY/recsys-train:$TAG
          echo "Pushed recsys-train:$TAG"

  build-feature:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.feature_changed == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push feature image
        run: |
          TAG=$(git rev-parse --short HEAD)
          REGISTRY=${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/recsys
          docker build -f Dockerfile.feature -t $REGISTRY/recsys-feature:$TAG .
          docker push $REGISTRY/recsys-feature:$TAG
          echo "Pushed recsys-feature:$TAG"

  build-serve:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.serve_changed == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push serving image
        run: |
          TAG=$(git rev-parse --short HEAD)
          REGISTRY=${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/recsys
          docker build -f api_gateway/Dockerfile -t $REGISTRY/recsys-serve:$TAG .
          docker push $REGISTRY/recsys-serve:$TAG
          echo "Pushed recsys-serve:$TAG"